<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI创业日报 - 每日最新AI创业项目</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --border: #2d2d44;
            --tag-bg: #2d2d44;
            --tag-text: #00d4aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .logo h1 {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { font-size: 0.8rem; color: var(--text-secondary); }
        .date-badge {
            background: var(--bg-card); padding: 0.5rem 1rem;
            border-radius: 20px; font-size: 0.85rem;
            color: var(--text-secondary); border: 1px solid var(--border);
        }
        .controls { padding: 2rem 0; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 1px solid var(--border); border-radius: 10px;
            background: var(--bg-card); color: var(--text-primary);
            font-size: 0.95rem;
        }
        .search-box input:focus { outline: none; border-color: var(--accent); }
        .search-box::before {
            content: "🔍"; position: absolute; left: 1rem;
            top: 50%; transform: translateY(-50%); font-size: 1rem;
        }
        .filter-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-btn {
            padding: 0.625rem 1rem; border: 1px solid var(--border);
            border-radius: 20px; background: var(--bg-card);
            color: var(--text-secondary); font-size: 0.85rem;
            cursor: pointer;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent); color: var(--bg-primary);
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--bg-card); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
.stat-number { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
.section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
.project-card {
background: var(--bg-card); border: 1px solid var(--border);
border-radius: 16px; padding: 1.5rem; cursor: pointer;
}
.project-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.project-name { font-size: 1.15rem; font-weight: 600; color: var(--text-primary); text-decoration: none; }
.project-name:hover { color: var(--accent); }
.funding-badge {
background: rgba(0, 212, 170, 0.15); color: var(--accent);
padding: 0.25rem 0.75rem; border-radius: 20px;
font-size: 0.75rem; font-weight: 600;
}
.project-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
.project-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
.project-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.tag { background: var(--tag-bg); color: var(--tag-text); padding: 0.25rem 0.625rem; border-radius: 15px; font-size: 0.75rem; }
.project-date { font-size: 0.8rem; color: var(--text-secondary); }
footer { border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; color: var(--text-secondary); font-size: 0.85rem; }
footer a { color: var(--accent); text-decoration: none; }
@media (max-width: 768px) {
.projects-grid { grid-template-columns: 1fr; }
.header-content { flex-direction: column; text-align: center; }
.controls { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<header>
<div class="container">
<div class="header-content">
<div class="logo">
<div class="logo-icon">🚀</div>
<div><h1>AI创业日报</h1><p>追踪全球最新AI创业项目</p></div>
</div>
<div class="date-badge" id="currentDate"></div>
</div>
</div>
</header>
<main class="container">
<div class="stats">
<div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">收录项目</div></div>
<div class="stat-card"><div class="stat-number" id="todayCount">0</div><div class="stat-label">今日更新</div></div>
<div class="stat-card"><div class="stat-number" id="fundingCount">0</div><div class="stat-label">融资项目</div></div>
</div>
<div class="controls">
<div class="search-box"><input type="text" id="searchInput" placeholder="搜索项目、领域、关键词..."></div>
<div class="filter-tags">
<button class="filter-btn active" data-filter="all">全部</button>
<button class="filter-btn" data-filter="AI写作">AI写作</button>
<button class="filter-btn" data-filter="AI代码">AI代码</button>
<button class="filter-btn" data-filter="AI设计">AI设计</button>
<button class="filter-btn" data-filter="AI视频">AI视频</button>
<button class="filter-btn" data-filter="AI客服">AI客服</button>
</div>
</div>
<h2 class="section-title">🔥 最新项目</h2>
<div class="projects-grid" id="projectsGrid"></div>
</main>
<footer>
<div class="container">
<p>AI创业日报 · 每日更新</p>
</div>
</footer>
<script>
const projects = [
{name:"Midjourney V7",description:"AI图像生成工具的全新一代",url:"https://midjourney.com",category:"AI设计",funding:"未融资",fundingAmount:"",region:"美国",date:"2026-03-02",source:"Product Hunt"},
{name:"Cursor AI",description:"基于AI的代码编辑器，内置GPT-4",url:"https://cursor.sh",category:"AI代码",funding:"A轮",fundingAmount:"$8M",region:"美国",date:"2026-03-01",source:"TechCrunch"},
{name:"月之暗面",description:"国内大模型创业公司，专注超长文本",url:"https://moonshot.cn",category:"AI写作",funding:"B轮",fundingAmount:"$300M",region:"中国",date:"2026-03-01",source:"36氪"},
{name:"Runway Gen-3",description:"AI视频生成平台",url:"https://runwayml.com",category:"AI视频",funding:"C轮",fundingAmount:"$141M",region:"美国",date:"2026-02-28",source:"TechCrunch"},
{name:"智谱AI",description:"清华系AI公司，ChatGLM系列",url:"https://chatglm.cn",category:"AI写作",funding:"B轮",fundingAmount:"¥25亿",region:"中国",date:"2026-02-28",source:"36氪"}
];
const projectsGrid = document.getElementById('projectsGrid');
const searchInput = document.getElementById('searchInput');
const filterBtns = document.querySelectorAll('.filter-btn');
const currentDate = document.getElementById('currentDate');
currentDate.textContent = new Date().toLocaleDateString('zh-CN');
function updateStats() {
document.getElementById('totalCount').textContent = projects.length;
document.getElementById('todayCount').textContent = projects.filter(p => p.date === new Date().toISOString().split('T')[0]).length;
document.getElementById('fundingCount').textContent = projects.filter(p => p.funding !== '未融资').length;
}
function renderProjects(list) {
projectsGrid.innerHTML = list.map(p => <div class="project-card">
<div class="project-header">
<a href="${p.url}" target="_blank" class="project-name">${p.name}</a>
${p.funding !== '未融资' ?<span class="funding-badge">${p.funding} ${p.fundingAmount}</span>: ''}
</div>
<p class="project-desc">${p.description}</p>
<div class="project-meta">
<div class="project-tags"><span class="tag">${p.category}</span><span class="tag">${p.region}</span></div>
<span class="project-date">${p.date} · ${p.source}</span>
</div>
</div>).join('');
}
function filterProjects() {
const term = searchInput.value.toLowerCase();
const filter = document.querySelector('.filter-btn.active').dataset.filter;
const filtered = projects.filter(p => {
const matchesSearch = p.name.toLowerCase().includes(term) || p.description.toLowerCase().includes(term);
const matchesFilter = filter === 'all' || p.category === filter;
return matchesSearch && matchesFilter;
});
renderProjects(filtered);
}
searchInput.addEventListener('input', filterProjects);
filterBtns.forEach(btn => btn.addEventListener('click', () => {
filterBtns.forEach(b => b.classList.remove('active'));
btn.classList.add('active');
filterProjects();
}));
updateStats();
renderProjects(projects);
</script>
</body>
</html>
