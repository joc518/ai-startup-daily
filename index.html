
<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI创业日报</title>

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 

            background: #0f0f23; 

            color: #fff; 

            line-height: 1.6;

        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header { 

            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);

            padding: 30px 0; 

            border-bottom: 1px solid #2d2d44;

        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }

        .logo { display: flex; align-items: center; gap: 15px; }

        .logo-icon { 

            width: 50px; height: 50px; 

            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);

            border-radius: 12px;

            display: flex; align-items: center; justify-content: center;

            font-size: 28px;

        }

        .logo h1 { 

            font-size: 28px; 

            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }

        .logo p { color: #a0a0a0; font-size: 14px; }

        .stats { 

            display: grid; 

            grid-template-columns: repeat(3, 1fr); 

            gap: 20px; 

            margin: 30px 0;

        }

        .stat-card { 

            background: #16213e; 

            padding: 25px; 

            border-radius: 12px; 

            border: 1px solid #2d2d44;

            text-align: center;

        }

        .stat-number { 

            font-size: 36px; 

            font-weight: bold; 

            color: #00d4aa; 

        }

        .stat-label { color: #a0a0a0; font-size: 14px; margin-top: 5px; }

        .section-title { 

            font-size: 20px; 

            margin: 30px 0 20px; 

            display: flex; align-items: center; gap: 10px;

        }

        .projects-grid { 

            display: grid; 

            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 

            gap: 20px;

            margin-bottom: 40px;

        }

        .project-card { 

            background: #16213e; 

            border: 1px solid #2d2d44;

            border-radius: 16px; 

            padding: 25px;

            transition: all 0.3s ease;

        }

        .project-card:hover { 

            transform: translateY(-4px); 

            border-color: #00d4aa;

        }

        .project-header { 

            display: flex; 

            justify-content: space-between; 

            align-items: flex-start; 

            margin-bottom: 15px;

        }

        .project-name { 

            font-size: 18px; 

            font-weight: 600; 

            color: #fff;

            text-decoration: none;

        }

        .project-name:hover { color: #00d4aa; }

        .funding-badge { 

            background: rgba(0, 212, 170, 0.15); 

            color: #00d4aa;

            padding: 4px 12px; 

            border-radius: 20px;

            font-size: 12px; 

            font-weight: 600;

        }

        .project-desc { color: #a0a0a0; font-size: 14px; margin-bottom: 15px; }

        .project-tags { display: flex; gap: 10px; flex-wrap: wrap; }

        .tag { 

            background: #2d2d44; 

            color: #00d4aa;

            padding: 5px 12px; 

            border-radius: 15px;

            font-size: 12px;

        }

        footer { 

            border-top: 1px solid #2d2d44;

            padding: 30px 0; 

            text-align: center;
            color: #666;
font-size: 14px;
}
@media (max-width: 768px) {
.stats { grid-template-columns: 1fr; }
.projects-grid { grid-template-columns: 1fr; }
.header-content { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<header>
<div class="container">
<div class="header-content">
<div class="logo">
<div class="logo-icon">🚀</div>
<div>
<h1>AI创业日报</h1>
<p>追踪全球最新AI创业项目</p>
</div>
</div>
</div>
</div>
</header>
<footer>
<div class="container">
<p>AI创业日报 · 每日更新 · 数据来源：Product Hunt、TechCrunch、36氪</p>
</div>
</footer>
</body>
</html>
